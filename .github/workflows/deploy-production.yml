name: Deploy to Production

on:
  push:
    branches: [main]

env:
  PROJECT_ID: pedagangpulsa27
  REGION: asia-southeast1
  SERVICE_NAME: pedagangpulsa-api
  IMAGE: asia-southeast1-docker.pkg.dev/pedagangpulsa27/docker-repo/pedagangpulsa-api
  DOMAIN: api.pedagangpulsa.com

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & Push Image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest -f PedagangPulsa.Api/Dockerfile .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --port 8080 \
            --memory 200Mi \
            --cpu 0.15 \
            --min-instances 0 \
            --max-instances 1 \
            --allow-unauthenticated \
            --set-env-vars "ASPNETCORE_ENVIRONMENT=Production,ConnectionStrings__DefaultConnection=${{ secrets.DB_CONNECTION }},ConnectionStrings__Redis=${{ secrets.REDIS_CONNECTION }},Jwt__Key=${{ secrets.JWT_KEY }},Jwt__Issuer=PedagangPulsa.Api,Jwt__Audience=PedagangPulsa.Client,EnableSwagger=true,EnableScalar=true" \
            --project ${{ env.PROJECT_ID }}

      - name: Map Custom Domain
        run: |
          gcloud beta run domain-mappings create \
            --service=${{ env.SERVICE_NAME }} \
            --domain=${{ env.DOMAIN }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --quiet 2>/dev/null || echo "Domain mapping already exists, skipping..."

      - name: Cleanup old images
        run: |
          echo "=== Image cleanup ==="
          # Step 1: Delete old tags using gcloud artifacts tags
          CURRENT_TAGS=$(gcloud artifacts tags list \
            --repository=docker-repo \
            --location=${{ env.REGION }} \
            --package=pedagangpulsa-api \
            --format='value(name)' \
            --quiet 2>/dev/null || echo "")

          for TAG in $CURRENT_TAGS; do
            if [[ "$TAG" != "latest" && "$TAG" != "${{ github.sha }}" ]]; then
              echo "Deleting tag: $TAG"
              gcloud artifacts tags delete "$TAG" \
                --repository=docker-repo \
                --location=${{ env.REGION }} \
                --package=pedagangpulsa-api \
                --quiet 2>/dev/null || echo "  WARNING: failed to delete tag $TAG"
            fi
          done

          # Step 2: Delete untagged images by digest
          gcloud artifacts docker images list "${{ env.IMAGE }}" \
            --format='value(version)' \
            --quiet 2>/dev/null | while read -r DIGEST; do
              # Get tags for this digest
              DIGEST_TAGS=$(gcloud artifacts tags list \
                --repository=docker-repo \
                --location=${{ env.REGION }} \
                --package=pedagangpulsa-api \
                --format='value(version)' \
                --quiet 2>/dev/null | grep "$DIGEST" || echo "")
              if [[ -z "$DIGEST_TAGS" ]]; then
                echo "Deleting untagged image: $DIGEST"
                gcloud artifacts docker images delete \
                  "${{ env.IMAGE }}@$DIGEST" \
                  --quiet --delete-tags 2>/dev/null || echo "  WARNING: failed to delete $DIGEST"
              fi
            done

          echo "=== Cleanup complete. Kept: latest, ${{ github.sha }} ==="
