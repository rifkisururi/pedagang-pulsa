name: Deploy to Production

on:
  push:
    branches: [main]

env:
  PROJECT_ID: pedagangpulsa27
  REGION: asia-southeast1
  SERVICE_NAME: pedagangpulsa-api
  IMAGE: asia-southeast1-docker.pkg.dev/pedagangpulsa27/docker-repo/pedagangpulsa-api
  DOMAIN: api.pedagangpulsa.com

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & Push Image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest -f PedagangPulsa.Api/Dockerfile .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --port 8080 \
            --memory 200Mi \
            --cpu 0.15 \
            --min-instances 0 \
            --max-instances 1 \
            --allow-unauthenticated \
            --set-env-vars "ASPNETCORE_ENVIRONMENT=Production,ConnectionStrings__DefaultConnection=${{ secrets.DB_CONNECTION }},ConnectionStrings__Redis=${{ secrets.REDIS_CONNECTION }},Jwt__Key=${{ secrets.JWT_KEY }},Jwt__Issuer=PedagangPulsa.Api,Jwt__Audience=PedagangPulsa.Client,EnableSwagger=true,EnableScalar=true" \
            --project ${{ env.PROJECT_ID }}

      - name: Map Custom Domain
        run: |
          gcloud beta run domain-mappings create \
            --service=${{ env.SERVICE_NAME }} \
            --domain=${{ env.DOMAIN }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --quiet 2>/dev/null || echo "Domain mapping already exists, skipping..."

      - name: Cleanup old images
        run: |
          echo "Fetching all tags for ${{ env.IMAGE }}..."
          gcloud artifacts docker images list-tags \
            "${{ env.IMAGE }}" \
            --format='value(tags)' \
            --quiet 2>/dev/null | tr ';' '\n' | sort -u | while read -r TAG; do
              TAG=$(echo "$TAG" | xargs)
              [[ -z "$TAG" || "$TAG" == "latest" || "$TAG" == "${{ github.sha }}" ]] && continue
              echo "Untagging: $TAG"
              gcloud artifacts docker images untag "${{ env.IMAGE }}:$TAG" --quiet 2>/dev/null || true
            done

          echo "Deleting untagged images..."
          gcloud artifacts docker images delete \
            "${{ env.IMAGE }}" \
            --delete-untagged \
            --quiet 2>/dev/null || true
          echo "Cleanup complete. Kept: latest, ${{ github.sha }}"
