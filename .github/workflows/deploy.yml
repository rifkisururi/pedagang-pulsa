name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: pedagangpulsa27
  REGION: asia-southeast2
  SERVICE_NAME: pedagangpulsa-api
  IMAGE: asia-southeast2-docker.pkg.dev/pedagangpulsa27/docker-repo/pedagangpulsa-api

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & Push Image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest -f PedagangPulsa.Api/Dockerfile .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 1 \
            --allow-unauthenticated \
            --set-env-vars "ASPNETCORE_ENVIRONMENT=Production,ConnectionStrings__DefaultConnection=${{ secrets.DB_CONNECTION }},ConnectionStrings__Redis=${{ secrets.REDIS_CONNECTION }},Jwt__Key=${{ secrets.JWT_KEY }},Jwt__Issuer=PedagangPulsa.Api,Jwt__Audience=PedagangPulsa.Client,EnableSwagger=true,EnableScalar=true" \
            --no-cpu-throttling \
            --project ${{ env.PROJECT_ID }}

      - name: Cleanup old images
        run: |
          gcloud artifacts docker images delete \
            ${{ env.IMAGE }} \
            --delete-tags \
            --keep-tags=1 \
            --quiet 2>/dev/null || true
